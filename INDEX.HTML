<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Forecasting Penjualan Laptop (SMA + MAPE)</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        background: #f7f8fa;
        font-family: "Poppins", sans-serif;
        padding: 30px;
      }
      .container {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #0d6efd;
        text-align: center;
        margin-bottom: 30px;
      }
      .table {
        margin-top: 20px;
      }
      .result-box {
        background: #e8f1ff;
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
      }
      .result-item {
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>
        Sistem Forecasting Penjualan Laptop (SMA + MAPE) Erablue Rawa Belong
      </h1>

      <!-- Form Input -->
      <div class="row mb-3">
        <div class="col-md-4">
          <input
            type="text"
            id="bulan"
            class="form-control"
            placeholder="Masukkan nama bulan (contoh: Juli)"
          />
        </div>
        <div class="col-md-4">
          <input
            type="number"
            id="penjualan"
            class="form-control"
            placeholder="Jumlah penjualan"
          />
        </div>
        <div class="col-md-4">
          <button class="btn btn-primary w-100" onclick="tambahData()">
            Tambahkan Data
          </button>
        </div>
      </div>

      <!-- Pilih Periode SMA -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="periode" class="form-label"
            >Pilih Periode SMA (misal: 3 bulan):</label
          >
          <input
            type="number"
            id="periode"
            class="form-control"
            value="3"
            min="2"
          />
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <button class="btn btn-success w-100" onclick="hitungSMA()">
            Hitung Forecasting
          </button>
        </div>
      </div>

      <!-- Tabel Data -->
      <table class="table table-bordered text-center">
        <thead class="table-primary">
          <tr>
            <th>Bulan</th>
            <th>Penjualan (Unit)</th>
            <th>Forecast (SMA)</th>
            <th>Error (%)</th>
          </tr>
        </thead>
        <tbody id="tabelData"></tbody>
      </table>

      <!-- Hasil -->
      <div class="result-box" id="hasilForecast">
        <h5>📈 Hasil Peramalan & Akurasi:</h5>
        <p id="hasilText">Belum ada hasil.</p>
        <p id="hasilMAPE" class="fw-bold text-primary"></p>
      </div>

      <!-- Grafik -->
      <canvas id="chartForecast" height="100"></canvas>
    </div>

    <script>
      let dataPenjualan = [];
      let chart;

      function tambahData() {
        const bulan = document.getElementById("bulan").value;
        const penjualan = parseFloat(
          document.getElementById("penjualan").value
        );
        if (bulan && !isNaN(penjualan)) {
          dataPenjualan.push({ bulan, penjualan });
          document.getElementById("bulan").value = "";
          document.getElementById("penjualan").value = "";
          tampilkanTabel();
        } else {
          alert("Mohon isi nama bulan dan jumlah penjualan dengan benar!");
        }
      }

      function tampilkanTabel() {
        const tbody = document.getElementById("tabelData");
        tbody.innerHTML = "";
        dataPenjualan.forEach((d) => {
          tbody.innerHTML += `
          <tr>
            <td>${d.bulan}</td>
            <td>${d.penjualan}</td>
            <td>${d.forecast ? d.forecast.toFixed(2) : "-"}</td>
            <td>${d.error ? d.error.toFixed(2) + "%" : "-"}</td>
          </tr>
        `;
        });
      }

      function hitungSMA() {
        const periode = parseInt(document.getElementById("periode").value);
        if (dataPenjualan.length < periode) {
          alert("Data belum cukup untuk periode yang dipilih!");
          return;
        }

        let errorList = [];

        // Hitung SMA dan Error (MAPE)
        for (let i = periode; i < dataPenjualan.length; i++) {
          let total = 0;
          for (let j = i - periode; j < i; j++) {
            total += dataPenjualan[j].penjualan;
          }
          const forecast = total / periode;
          dataPenjualan[i].forecast = forecast;

          // Hitung Error (%)
          const actual = dataPenjualan[i].penjualan;
          const error = Math.abs((actual - forecast) / actual) * 100;
          dataPenjualan[i].error = error;
          errorList.push(error);
        }

        // Prediksi bulan berikutnya
        let totalTerakhir = 0;
        for (
          let i = dataPenjualan.length - periode;
          i < dataPenjualan.length;
          i++
        ) {
          totalTerakhir += dataPenjualan[i].penjualan;
        }
        const prediksiBerikut = totalTerakhir / periode;

        // Hitung rata-rata MAPE
        const mape =
          errorList.length > 0
            ? errorList.reduce((a, b) => a + b, 0) / errorList.length
            : 0;

        document.getElementById(
          "hasilText"
        ).innerText = `Prediksi penjualan untuk bulan berikutnya adalah sekitar ${prediksiBerikut.toFixed(
          2
        )} unit.`;
        document.getElementById(
          "hasilMAPE"
        ).innerText = `Tingkat akurasi model (MAPE): ${mape.toFixed(2)}% (${(
          100 - mape
        ).toFixed(2)}% akurat).`;

        tampilkanTabel();
        tampilkanChart(prediksiBerikut);
      }

      function tampilkanChart(prediksi) {
        const ctx = document.getElementById("chartForecast").getContext("2d");
        const labels = dataPenjualan.map((d) => d.bulan).concat("Prediksi");
        const dataActual = dataPenjualan.map((d) => d.penjualan);
        const dataForecast = dataPenjualan
          .map((d) => (d.forecast ? d.forecast : null))
          .concat(prediksi);

        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Penjualan Aktual",
                data: dataActual,
                borderColor: "blue",
                tension: 0.3,
                fill: false,
              },
              {
                label: "Forecast (SMA)",
                data: dataForecast,
                borderColor: "orange",
                borderDash: [5, 5],
                tension: 0.3,
                fill: false,
              },
            ],
          },
          options: {
            responsive: true,
            plugins: { legend: { position: "bottom" } },
            scales: {
              y: { beginAtZero: true },
            },
          },
        });
      }
    </script>
  </body>
</html>
